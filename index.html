<!doctype html>
<html lang="en" style="color-scheme: light dark;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Lovable App</title>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Lovable App" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Prevent flash of unstyled content by applying theme before render -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const resolvedTheme = theme === 'system' || !theme ? systemTheme : theme;
        document.documentElement.classList.add(resolvedTheme);
        document.documentElement.style.colorScheme = resolvedTheme;
      })();
    </script>
    <style>
      /* Loading screen to prevent flash */
      .theme-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: hsl(210 20% 98%);
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      .dark .theme-loading {
        background: hsl(222 47% 6%);
      }
      .theme-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .theme-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid hsl(217 91% 40% / 0.2);
        border-top-color: hsl(217 91% 40%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .dark .theme-spinner {
        border-color: hsl(217 91% 60% / 0.2);
        border-top-color: hsl(217 91% 60%);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div class="theme-loading" id="theme-loader">
      <div class="theme-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
